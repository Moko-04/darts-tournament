// ダブルス＝決勝＋ルーザー（ロビン終了で自動作成）／シングルス＝全員で1本
function TournamentTab({ groups, standings, nameOf, brk, setBrk, cfg, getResult, isS, sNames, session, withLosers }) {
  let remaining = 0;
  groups.forEach((ids, gi) => { for (let i = 0; i < ids.length; i++) for (let j = i + 1; j < ids.length; j++) { const r = getResult(gi, ids[i], ids[j]); if (!r || r.winner == null) remaining++; } });
  const rrComplete = groups.length > 0 && remaining === 0;
  const seedsFor = kind => {
    const sts = groups.map((_, gi) => standings(gi));
    const advOf = gi => advanceForSize(groups[gi].length); // 各組のチーム数で進出数が変わる
    const seeds = [], maxLen = Math.max(0, ...sts.map(s => s.length));
    if (kind === 'winners') { const maxAdv = Math.max(0, ...groups.map((_, gi) => advOf(gi))); for (let r = 0; r < maxAdv; r++) sts.forEach((s, gi) => { if (r < advOf(gi) && s[r]) seeds.push(s[r].id); }); }
    else { for (let r = 0; r < maxLen; r++) sts.forEach((s, gi) => { if (r >= advOf(gi) && s[r]) seeds.push(s[r].id); }); }
    return seeds;
  };
  useEffect(() => {
    if (isS || !rrComplete) return;
    setBrk(prev => {
      const next = { ...prev };
      if (!next.winners) next.winners = buildBracket(seedsFor('winners'));
      if (withLosers && !next.losers) next.losers = buildBracket(seedsFor('losers'));
      return next;
    });
  }, [rrComplete, isS, withLosers]);
  const mkSetWinner = kind => (mid, side) => setBrk(prev => { const nb = JSON.parse(JSON.stringify(prev[kind])); const m = findMatch(nb, mid); m.winner = side; if (side != null) m.board = null; return { ...prev, [kind]: nb }; });
  const mkSetBoard = kind => (mid, board) => setBrk(prev => { const nb = JSON.parse(JSON.stringify(prev[kind])); findMatch(nb, mid).board = board; return { ...prev, [kind]: nb }; });

  if (isS) { // シングルス: 全員で1つのトーナメント
    const regenS = () => { const seeds = sNames.map(s => (s || '').trim()).filter(Boolean); if (seeds.length < 2) { alert('2人以上必要です。'); return; } if (!confirm('トーナメントを作り直しますか？')) return; setBrk({ winners: buildBracket(seeds), losers: null }); };
    if (!brk.winners) return <Empty msg="「エントリー」で参加者を入れて「トーナメント作成」を押してください。" />;
    return (
      <div className="space-y-3">
        <div className="flex items-center justify-between">
          <h2 className="text-lg font-bold">シングルス トーナメント <span className="text-xs font-normal text-gray-400">（全員で1本）</span></h2>
          <button onClick={regenS} className="text-xs text-gray-500 hover:text-gray-800 underline">組み直し</button>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3">
          <BracketView b={brk.winners} nameOf={nameOf} setWinner={mkSetWinner('winners')} setBoard={mkSetBoard('winners')} boards={cfg.boards} champTitle="優勝" />
        </div>
        <FinishBar session={session} cfg={cfg} />
      </div>
    );
  }

  const regen = () => { if (!confirm('現在のトーナメントを破棄して、今の順位で作り直しますか？')) return; setBrk(prev => ({ ...prev, winners: buildBracket(seedsFor('winners')), losers: withLosers ? buildBracket(seedsFor('losers')) : null })); };
  if (!groups.length) return <Empty msg="先にエントリーしてグループに振り分けてください。" />;
  if (!brk.winners && !brk.losers) return <Empty msg={`ラウンドロビンが終わると自動でトーナメントを作成します（残り ${remaining} 試合）。`} />;
  // 決勝・ルーザー両方で使用中の台（未確定試合に割当済み）。両ブラケットで重複させない。
  const usedBoards = new Set();
  ['winners', 'losers'].forEach(kind => { const bk = brk[kind]; if (bk) allMatches(bk).forEach(m => { if (m.board && matchWinner(bk, m) == null) usedBoards.add(m.board); }); });
  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h2 className="text-lg font-bold">トーナメント <span className="text-xs font-normal text-gray-400">（各組上位2→決勝・5以上の組は上位3{withLosers ? ' / 残り→ルーザー' : '・ルーザー無し'}）</span></h2>
        <button onClick={regen} className="text-xs text-gray-500 hover:text-gray-800 underline">今の順位で組み直し</button>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3">
        <div className="text-sm font-bold text-emerald-700 mb-2">🏆 決勝トーナメント</div>
        {brk.winners ? <BracketView b={brk.winners} nameOf={nameOf} setWinner={mkSetWinner('winners')} setBoard={mkSetBoard('winners')} boards={cfg.boards} usedBoards={usedBoards} champTitle="優勝" /> : <p className="text-sm text-gray-400">作成待ち</p>}
      </div>
      {withLosers && (
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3">
        <div className="text-sm font-bold text-amber-700 mb-2">🥈 ルーザートーナメント</div>
        {brk.losers ? <BracketView b={brk.losers} nameOf={nameOf} setWinner={mkSetWinner('losers')} setBoard={mkSetBoard('losers')} boards={cfg.boards} usedBoards={usedBoards} /> : <p className="text-sm text-gray-400">作成待ち</p>}
      </div>
      )}
      <FinishBar session={session} cfg={cfg} />
    </div>
  );
}

/* ---------- ボード状況 ---------- */
function Boards({ cfg, groups, nameOf, getResult, brk, assign, setAssign }) {
  const ready = [];
  groups.forEach((ids, gi) => {
    for (let i = 0; i < ids.length; i++) for (let j = i + 1; j < ids.length; j++) {
      const r = getResult(gi, ids[i], ids[j]);
      if (!r || r.winner == null) ready.push({ gid: `rr-${gi}-${Math.min(ids[i], ids[j])}-${Math.max(ids[i], ids[j])}`, label: `グループ${GMARK[gi]}`, a: ids[i], b: ids[j] });
    }
  });
  ['winners', 'losers', 'singles'].forEach(kind => {
    const b = brk[kind]; if (!b) return;
    const tag = { winners: '決勝T', losers: 'ルーザー', singles: 'シングルス' }[kind];
    allMatches(b).forEach(m => {
      const a = resolveSlot(b, m.a), bb = resolveSlot(b, m.b);
      if (a && a !== 'BYE' && bb && bb !== 'BYE' && m.winner == null) ready.push({ gid: `${kind}-${m.id}`, label: tag, a, b: bb });
    });
  });

  const occupied = {};
  Object.entries(assign).forEach(([gid, bn]) => { if (ready.find(r => r.gid === gid)) occupied[bn] = gid; });

  function autoAssign() {
    const next = { ...assign }; const free = [];
    for (let n = 1; n <= cfg.boards; n++) if (!occupied[n]) free.push(n);
    let fi = 0;
    for (const r of ready) { if (Object.values(occupied).includes(r.gid)) continue; if (fi >= free.length) break; next[r.gid] = free[fi++]; }
    setAssign(next);
  }
  const clearBoard = n => { const gid = occupied[n]; if (!gid) return; const next = { ...assign }; delete next[gid]; setAssign(next); };
  const boardList = Array.from({ length: cfg.boards }, (_, i) => i + 1);
  const waiting = ready.filter(r => !Object.values(occupied).includes(r.gid));

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-lg font-bold">ボード状況 <span className="text-sm text-gray-400 font-normal">（{cfg.boards}台）</span></h2>
        <button onClick={autoAssign} className="bg-gray-900 hover:bg-gray-700 text-white text-sm font-bold rounded-lg px-4 py-1.5">空き台に自動割当</button>
      </div>
      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
        {boardList.map(n => {
          const gid = occupied[n]; const m = ready.find(r => r.gid === gid);
          return (
            <div key={n} className={`rounded-xl border p-3 min-h-[120px] flex flex-col shadow-sm ${m ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-gray-200'}`}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-bold text-gray-500">🎯 ボード {n}</span>
                {m && <button onClick={() => clearBoard(n)} className="text-xs text-gray-400 hover:text-red-500">空ける</button>}
              </div>
              {m ? (
                <div className="flex-1 flex flex-col justify-center">
                  <span className="text-[10px] text-emerald-600 mb-1">{m.label}</span>
                  <span className="text-sm font-semibold leading-snug">{nameOf(m.a)}</span>
                  <span className="text-xs text-gray-400 my-0.5">vs</span>
                  <span className="text-sm font-semibold leading-snug">{nameOf(m.b)}</span>
                </div>
              ) : <div className="flex-1 flex items-center justify-center text-gray-300 text-sm">空き</div>}
            </div>
          );
        })}
      </div>
      <div>
        <h3 className="text-sm text-gray-500 mb-2">待機中の試合 <span className="text-gray-400">{waiting.length}</span></h3>
        {waiting.length === 0 ? <p className="text-sm text-gray-400">なし</p> : (
          <div className="flex flex-wrap gap-2">
            {waiting.map(r => (
              <span key={r.gid} className="text-xs px-2 py-1 rounded-lg bg-white border border-gray-200 text-gray-600">
                <span className="text-gray-400">{r.label}:</span> {nameOf(r.a)} vs {nameOf(r.b)}
              </span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

                <div className="flex-1 min-w-0">
                  <div className="font-medium truncate">{h.name}</div>
                  <div className="text-[11px] text-gray-400">{fmtDate(h.created_at)}</div>
                </div>
                <button onClick={() => view(h.id)} className="shrink-0 text-xs border border-gray-300 rounded-lg px-3 py-1.5 text-gray-700 hover:bg-gray-50">表示</button>
                <button onClick={() => del(h.id, h.name)} className="shrink-0 text-xs text-red-400 hover:text-red-600 px-2 py-1.5">削除</button>
              </li>
            ))}
          </ul>}
      {viewing && (
        <div className="fixed inset-0 z-50 bg-gray-50 overflow-auto">
          <div className="max-w-6xl mx-auto px-4 pb-24">
            <div className="sticky top-0 bg-gray-50/95 backdrop-blur py-2 flex items-center justify-between z-10">
              <span className="text-xs text-gray-400 truncate">履歴：{viewing.name}</span>
              <button onClick={() => setViewing(null)} className="shrink-0 text-sm bg-gray-900 text-white rounded-lg px-4 py-1.5">✕ 閉じる</button>
            </div>
            <SnapshotView snap={viewing.data || {}} updatedAt={viewing.created_at} />
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- スナップショット読み取り表示（公開ビュー／履歴 共通） ---------- */
function SnapshotView({ snap, updatedAt, live }) {
  const [tab, setTab] = useState('rr');
  const mode = snap.mode || 'doubles';
  const cfg = snap.cfg || { store: '', boards: 8, groups: 4 };
  const isS = mode === 'singles';
  const ev = (mode === 'doubles' ? snap.dbl : mode === 'singlesrr' ? snap.sglR : snap.sgl) || { teams: [], groups: [], rr: {}, brk: { winners: null, losers: null }, assign: {} };
  const teams = ev.teams || [], groups = ev.groups || [], rr = ev.rr || {}, brk = ev.brk || { winners: null, losers: null };
  const { nameOf, standings } = makeHelpers(teams, groups, rr);
  const hasRR = !isS && groups.length > 0;
  const withLosers = mode === 'doubles' ? true : (cfg.losersS !== false);
  const hasBrk = !!(brk && (brk.winners || brk.losers));
  const tabs = isS ? [['tournament', 'トーナメント']] : [['rr', '順位表'], ['tournament', 'トーナメント']];
  const curTab = tabs.some(t => t[0] === tab) ? tab : tabs[0][0];
  let fmt = '';
  try { fmt = updatedAt ? new Date(updatedAt).toLocaleString('ja-JP', live ? { hour: '2-digit', minute: '2-digit' } : { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : ''; } catch (e) {}
  return (
    <>
      <header className="py-3 sm:py-4">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xl">🎯</span>
          <h1 className="text-base sm:text-lg font-bold tracking-tight truncate">{cfg.store || 'ハウストーナメント'}</h1>
          <span className="text-[11px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-medium shrink-0">{live ? '閲覧専用' : '履歴'}</span>
          {fmt && <span className="text-gray-400 text-xs ml-auto shrink-0">{live ? '更新 ' : ''}{fmt}</span>}
        </div>
        {teams.length > 0 && <p className="text-xs text-gray-400 mt-1">{teams.length}{mode === 'doubles' ? 'チーム' : '人'}{!isS ? ` / ${groups.length}グループ` : ''}{live ? ' ・ 約12秒ごとに自動更新' : ''}</p>}
      </header>
      <nav className="flex gap-5 border-b border-gray-200 mb-6">
        {tabs.map(([k, label]) => (
          <button key={k} onClick={() => setTab(k)}
            className={`pb-2.5 text-base border-b-2 -mb-px transition ${curTab === k ? 'border-gray-900 text-gray-900 font-bold' : 'border-transparent text-gray-400 hover:text-gray-600'}`}>{label}</button>
        ))}
      </nav>
      {curTab === 'rr' && (hasRR
        ? <PublicStandings {...{ groups, standings, nameOf }} />
        : <Empty msg="まだ順位表がありません。" />)}
      {curTab === 'tournament' && (hasBrk ? (
        isS
          ? <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3"><BracketView b={brk.winners} nameOf={nameOf} boards={cfg.boards} readOnly champTitle="優勝" /></div>
          : <div className="space-y-6">
            {brk.winners && <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3"><div className="text-sm font-bold text-emerald-700 mb-2">🏆 決勝トーナメント</div><BracketView b={brk.winners} nameOf={nameOf} boards={cfg.boards} readOnly champTitle="優勝" /></div>}
            {withLosers && brk.losers && <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3"><div className="text-sm font-bold text-amber-700 mb-2">🥈 ルーザートーナメント</div><BracketView b={brk.losers} nameOf={nameOf} boards={cfg.boards} readOnly /></div>}
          </div>
      ) : <Empty msg="トーナメントはまだ作成されていません。" />)}
    </>
  );
}

/* ---------- 公開進行ビュー（参加者向け・読み取り専用・?view=shareId） ---------- */
function PublicView({ shareId }) {
  const [snap, setSnap] = useState(undefined); // undefined=読込中 / null=見つからない / object=データ
  const [updatedAt, setUpdatedAt] = useState(null);
  useEffect(() => {
    if (!supa || !shareId) { setSnap(null); return; }
    let alive = true;
    const fetchSnap = async () => {
      try {
        const { data } = await supa.from('tournament_shares').select('data, updated_at').eq('id', shareId).maybeSingle();
        if (!alive) return;
        if (data && data.data) { setSnap(data.data); setUpdatedAt(data.updated_at); } else setSnap(null);
      } catch (e) { if (alive) setSnap(null); }
    };
    fetchSnap();
    const iv = setInterval(fetchSnap, 12000); // 自動リアルタイム（12秒ごと）
    return () => { alive = false; clearInterval(iv); };
  }, [shareId]);

  if (snap === undefined) return <Splash text="読み込み中…" />;
  if (!snap) return <Splash text="この公開ビューは見つかりませんでした。URLをご確認ください。" />;

  return (
    <div className="min-h-screen max-w-6xl mx-auto px-4 pb-24">
      <SnapshotView snap={snap} updatedAt={updatedAt} live />
    </div>
  );
}
function Root() {
  const [session, setSession] = useState(AUTH_ENABLED ? undefined : null);
  const [ready, setReady] = useState(!AUTH_ENABLED);
  useEffect(() => {
    if (!AUTH_ENABLED) return;
    supa.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = supa.auth.onAuthStateChange((_e, s) => { setSession(s); setReady(false); });
    return () => sub.subscription.unsubscribe();
  }, []);
  useEffect(() => {
    if (!AUTH_ENABLED || !session) return;
    cloudLoad(session.user.id).finally(() => setReady(true));
  }, [session]);
  if (!AUTH_ENABLED) return <App session={null} />;
  if (session === undefined) return <Splash text="読み込み中…" />;
  if (!session) return <Login />;
  if (!ready) return <Splash text="データを読み込み中…" />;
  return <App key={session.user.id} session={session} />;
}

const VIEW_ID = (() => { try { return new URLSearchParams(window.location.search).get('view'); } catch (e) { return null; } })();
ReactDOM.createRoot(document.getElementById('root')).render(
  VIEW_ID ? <PublicView shareId={VIEW_ID} /> : <Root />
);
</script>
</body>
</html>
